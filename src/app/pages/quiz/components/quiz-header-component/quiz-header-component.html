<div class="mb-6">
  <div class="text-center mb-4">
    <h1 class="text-4xl font-extrabold text-yellow-400 mb-1">Quem é esse Pokémon❓</h1>
    <p class="text-gray-500 text-sm">Teste seus conhecimentos!</p>
  </div>

  <div class="flex justify-between items-center mb-3">
    <div class="text-center">
      <p class="text-xs text-gray-400 uppercase tracking-wider">Partida</p>
      <p class="text-lg font-bold text-yellow-500">{{ score }} pts</p>
    </div>
    <div class="text-center">
      <p class="text-xs text-gray-400 uppercase tracking-wider">Sessão</p>
      <p class="text-lg font-bold text-indigo-500">{{ sessionScore }} pts</p>
    </div>
  </div>

  <div class="flex justify-between text-sm text-gray-500 mb-1">
    <span>Questão {{ currentQuestion + 1 }} de {{ totalQuestions }}</span>
  </div>
  <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
    <div
      class="h-2 rounded-full bg-linear-to-r from-yellow-300 to-yellow-500 transition-all duration-500"
      [style.width]="(currentQuestion / totalQuestions * 100) + '%'"
    ></div>
  </div>
</div>

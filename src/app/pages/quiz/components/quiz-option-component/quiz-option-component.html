<div class="grid grid-cols-2 gap-3 mb-6">
  <button
    *ngFor="let option of options"
    (click)="optionSelected.emit(option)"
    [disabled]="answered"
    class="border-2 rounded-xl px-4 py-3 font-semibold capitalize transition-all duration-200"
    [ngClass]="getOptionClass(option)"
  >
    {{ option.name }}
  </button>
</div>

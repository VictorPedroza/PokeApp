<div class="text-center py-8">
  <div class="bg-white rounded-2xl shadow-xl p-10">
    <div class="text-6xl mb-4">🏅</div>
    <h2 class="text-3xl font-bold mb-2">Resultado</h2>
    <p class="text-6xl font-bold text-yellow-500 mb-1">
      {{ score }}<span class="text-2xl text-gray-400">/{{ maxScore }}</span>
    </p>
    <p *ngIf="isNewHighScore" class="text-green-600 font-bold text-sm mb-2">🎉 Novo recorde!</p>
    <p class="text-gray-600 text-lg mb-8">{{ scoreMessage }}</p>
    <button
      (click)="restart.emit()"
      class="bg-red-500 hover:bg-red-600 text-white font-bold px-10 py-3 rounded-full shadow-lg transition-all"
    >
      🔄 Jogar Novamente
    </button>
  </div>
</div>
